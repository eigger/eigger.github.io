<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gicisky Image Uploader</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap');

    :root {
      --bg-color: #f8f9fa;
      --text-color: #333;
      --primary-color: #007bff;
      --secondary-color: #555;
      --button-bg: #000000;
      --button-hover: #5e5d5d;
      --container-bg: white;
      --shadow-color: rgba(0, 0, 0, 0.1);
      --status-bg: #f3f3f3;
    }

    [data-theme="dark"] {
      --bg-color: #121212;
      --text-color: #f8f9fa;
      --primary-color: #90caf9;
      --secondary-color: #ccc;
      --button-bg: #3f3f3f;
      --button-hover: #a0a0a0;
      --container-bg: #1e1e1e;
      --shadow-color: rgba(255, 255, 255, 0.1);
      --status-bg: #333;
    }

    body {
      font-family: 'Nanum Gothic', sans-serif;
      text-align: center;
      margin: 0px;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }

    .version {
      text-align: left;
      font-size: 12px;
    }

    h1,
    h2 {
      color: var(--primary-color);
      margin-bottom: 10px;
      font-size: 20px;
    }

    label {
      font-weight: bold;
      margin-right: 5px;
      color: var(--secondary-color);
      font-size: 14px;
    }

    label.info {
      font-size: 13px;
      margin: 10px;
    }

    input,
    select,
    button {
      padding: 3px;
      margin: 3px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input,
    select {
      min-width: 150px;
      text-align: center;
      color: var(--text-color);
      background-color: var(--bg-color);
    }

    button {
      max-width: 200px;
      background-color: var(--button-bg);
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s;
      border: none;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    button:hover {
      background-color: var(--button-hover);
    }

    button:disabled:hover {
      background-color: #ccc;
      cursor: not-allowed;
    }

    #ble-support {
      color: red;
      font-weight: bold;
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
      background: var(--container-bg);
      padding: 3px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px var(--shadow-color);
    }

    .step-container {
      text-align: left;
      max-width: 550px;
      margin: 5px auto;
      background: var(--container-bg);
      padding: 3px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px var(--shadow-color);
    }

    .image-container {
      border: 0.5px solid rgb(231, 231, 231);
      max-width: 350px;
      margin: 5px auto;
      background: white;
      padding: 3px;
      border-radius: 15px;
      box-shadow: 0px 0px 10px var(--shadow-color);
    }

    .select-label {
      margin: 10px 0;
      text-align: center;
    }

    .send-image {
      margin: 10px 0;
      text-align: center;
    }

    canvas {
      border: 1px solid rgb(204, 203, 203);
      display: block;
      margin: 10px auto;
    }

    .file-upload {
      text-align: center;
    }

    #pixelData {
      display: none;
    }

    .log-view {
      margin: 10px 0;
      text-align: center;
      display: block;
    }

    #status {
      text-align: left;
      padding: 10px;
      border-radius: 5px;
      background-color: var(--status-bg);
      color: var(--text-color);
      font-size: 12px;
      margin-top: 10px;
    }

    #log {
      text-align: left;
      padding: 10px;
      border-radius: 5px;
      background-color: var(--status-bg);
      color: var(--text-color);
      font-size: 12px;
      margin-top: 10px;
      height: 100px;
      overflow: auto;
    }

    .pixlr-button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s;
      border: none;
      font-size: 12px;
      cursor: pointer;
    }

    .theme-container {
      display: flex;
      /* justify-content: space-evenly; */
      align-items: center;
    }

    .theme-toggle {
      max-width: 50px;
      font-size: 24px;
      cursor: pointer;
      border: none;
      background: none;
    }

    .slider-container {
      margin: 0 auto;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .slider-container label {
      font-size: 14px;
      max-width: 150px;
    }

    .mac-input {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2px;
      margin: 10px 0;
    }

    .mac-dot {
      font-weight: bold;
      font-size: 18px;
      color: var(--secondary-color);
    }

    .mac-octet {
      width: 40px;
      min-width: 0;
      padding: 5px 2px;
      text-align: center;
      font-size: 15px;
    }

    .mac-actions {
      margin: 6px 0 10px;
    }

    .scan-button {
      font-size: 13px;
      padding: 6px 14px;
    }

    .scanner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
    }

    .scanner-overlay.active {
      display: flex;
    }

    .scanner-panel {
      background: var(--container-bg);
      border-radius: 12px;
      padding: 16px;
      max-width: 90vw;
      width: 360px;
      box-shadow: 0 4px 20px var(--shadow-color);
    }

    .scanner-panel h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .scanner-video-wrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4 / 3;
    }

    #scannerVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scanner-guide {
      position: absolute;
      inset: 20% 10%;
      border: 2px dashed rgba(255, 255, 255, 0.7);
      border-radius: 4px;
      pointer-events: none;
    }

    .scanner-status {
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--secondary-color);
      min-height: 1.2em;
    }

    .scanner-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }

    .scanner-buttons button {
      flex: 1;
      max-width: none;
    }

    #barcodePhotoInput {
      display: none;
    }

    .progress-wrap {
      position: relative;
      display: none;
      max-width: 300px;
      height: 18px;
      margin: 8px auto;
      background-color: var(--status-bg);
      border-radius: 9px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--primary-color);
      transition: width 0.2s ease;
    }

    .progress-text {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      line-height: 18px;
      font-size: 11px;
      font-weight: bold;
      color: var(--text-color);
    }
  </style>
</head>

<body data-theme="light">
  <div class="container">
    <!-- 테마 및 제목 영역 -->
    <div class="theme-container">
      <button class="theme-toggle" id="themeToggle">☀️</button>
      <h1>전자 라벨 (Gicisky) Image Uploader</h1>
    </div>
    <div class="info">
      <div id="ble-support"></div>
    </div>

    <!-- 라벨 타입 선택 (항상 보임) -->
    <div class="step-container">
      <label>1 단계 : 라벨 타입을 선택 하세요.</label>
      <div class="select-label">
        <select id="optionsSelect">
          <option value="0B">2.1인치 (250x122) 검정 & 흰색 & 빨강</option>
          <option value="33">2.9인치 (296x128) 검정 & 흰색 & 빨강</option>
          <option value="22B">3.7인치 (240x416) 검정 & 흰색 & 빨강</option>
          <option value="4B">4.2인치 (400x300) 검정 & 흰색 & 빨강</option>
          <option value="2B">7.5인치 (800x480) 검정 & 흰색 & 빨강</option>
          <option value="8B">10.2인치 (960x640) 검정 & 흰색 & 빨강</option>
          <option value="A0">2.1인치 (250x132) 검정</option>
        </select>
      </div>
    </div>

    <!-- 이미지 업로드 -->
    <div class="step-container">
      <label>2 단계 : 업로드 할 이미지를 선택 하세요.</label>
      <div class="file-upload">
        <input type="file" id="imageUpload" accept="image/*">
        <!-- <button class="pixlr-button" id="pixlrButton">웹 이미지 에디터 (필요시)</button> -->
        <button id="saveButton">저장하기</button>
      </div>
    </div>

    <!--
      라벨 타입별 설정(가로/세로/회전/미러/압축 등)은 더 이상 숨김 input/checkbox로
      관리하지 않고, 아래 <script>의 LabelState 객체와 LABEL_CONFIG 맵으로 관리합니다.
    -->

    <div class="step-container">
      <label>3 단계 : 이미지의 크기 및 색상을 조절 하세요.</label><br>
      <label class="info">- 이미지를 드래그 or 휠을 사용하여 조절 하세요.</label><br>
      <!-- 캔버스 및 편집 버튼 -->
      <div class="image-container" id="myImage">
        <canvas id="myCanvas"></canvas>
      </div>
      <!-- 슬라이더 컨트롤 -->
      <div class="slider-container">
        <label for="luminanceSlider">검정 임계값: <span id="lumVal">128</span></label>
        <input type="range" id="luminanceSlider" min="0" max="255" value="128">
      </div>
      <div class="slider-container">
        <label for="redSlider">빨강 임계값: <span id="redVal">170</span></label>
        <input type="range" id="redSlider" min="0" max="255" value="170">
      </div>
    </div>

    <!-- 숨김 텍스트영역 (픽셀 데이터 저장) -->
    <textarea id="pixelData"></textarea>

    <!-- BLE 업로드 섹션 (필요 시) -->
    <div class="step-container">
      <label>4 단계 : 전자라벨에 연결하여 이미지를 업로드 하세요.</label><br>
      <label class="info">- 전자라벨 화면/바코드의 번호(예: 92.12.78.64)를 입력하거나 바코드를 스캔하세요.</label><br>
      <label class="info">- 입력한 라벨만 블루투스 선택창에 표시됩니다.</label><br>
      <label class="info">- 미입력 시 주변의 모든 전자라벨이 표시됩니다.</label>

      <div class="mac-input">
        <input type="text" class="mac-octet" id="mac0" maxlength="2" inputmode="numeric" placeholder="xx" autocomplete="off">
        <span class="mac-dot">.</span>
        <input type="text" class="mac-octet" id="mac1" maxlength="2" inputmode="numeric" placeholder="xx" autocomplete="off">
        <span class="mac-dot">.</span>
        <input type="text" class="mac-octet" id="mac2" maxlength="2" inputmode="numeric" placeholder="xx" autocomplete="off">
        <span class="mac-dot">.</span>
        <input type="text" class="mac-octet" id="mac3" maxlength="2" inputmode="numeric" placeholder="xx" autocomplete="off">
      </div>
      <div class="mac-actions">
        <button type="button" class="scan-button" id="scanBarcodeButton">바코드 스캔</button>
        <input type="file" id="barcodePhotoInput" accept="image/*" capture="environment">
      </div>

      <div class="send-image">
        <button id="uploadButton">이미지 업로드</button>
      </div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
        <span class="progress-text" id="progressText">0%</span>
      </div>

      <div class="log-view">
        <!-- <button id="clearLogButton">로그 정리</button> -->
        <div id="status"></div>
        <div id="log"></div>
      </div>
    </div>
    <div class="step-container">
      <div class="version">
        Version : 260605
        <a href="https://github.com/eigger/eigger.github.io" target="_blank">GitHub (eigger)</a>
      </div>

    </div>

  </div>

  <!-- 바코드 스캔 오버레이 -->
  <div class="scanner-overlay" id="scannerOverlay">
    <div class="scanner-panel">
      <h2>바코드 스캔</h2>
      <div class="scanner-video-wrap">
        <video id="scannerVideo" playsinline muted></video>
        <div class="scanner-guide"></div>
      </div>
      <p class="scanner-status" id="scannerStatus">카메라 준비 중...</p>
      <div class="scanner-buttons">
        <button type="button" id="scannerPhotoButton">사진 촬영</button>
        <button type="button" id="scannerCloseButton">닫기</button>
      </div>
    </div>
  </div>

  <!-- ZXing: 1D 바코드 인식 (Chrome BarcodeDetector보다 안정적) -->
  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>

  <!-- JavaScript: 기능별 모듈화 (슬라이더 오버레이 적용 및 pixelData 갱신) -->
  <script>
    (function () {
      /* ──────────── 상수 ──────────── */
      // BLE 이미지 전송 프로토콜 관련 상수
      const IMAGE_PART_HEX_LEN = 480;   // 한 번에 전송하는 이미지 조각 길이(hex 문자 수)
      const COMP_BLOCK_MARKER = 0x75;   // 압축 포맷에서 각 열(line) 블록 시작 마커
      const COMP_HEADER_EXTRA = 7;      // 압축 블록 헤더에 더해지는 바이트 수

      /* ──────────── DOM 참조 캐시 ──────────── */
      // 반복되는 document.getElementById 호출을 한곳에 모아 가독성과 성능을 높입니다.
      const $ = (id) => document.getElementById(id);
      const dom = {
        body: document.body,
        themeToggle: $('themeToggle'),
        bleSupport: $('ble-support'),
        optionsSelect: $('optionsSelect'),
        imageUpload: $('imageUpload'),
        saveButton: $('saveButton'),
        uploadButton: $('uploadButton'),
        imageBox: $('myImage'),
        canvas: $('myCanvas'),
        luminanceSlider: $('luminanceSlider'),
        redSlider: $('redSlider'),
        lumVal: $('lumVal'),
        redVal: $('redVal'),
        pixelData: $('pixelData'),
        status: $('status'),
        log: $('log'),
        progressWrap: $('progressWrap'),
        progressBar: $('progressBar'),
        progressText: $('progressText'),
        macOctets: [$('mac0'), $('mac1'), $('mac2'), $('mac3')],
        scanBarcodeButton: $('scanBarcodeButton'),
        barcodePhotoInput: $('barcodePhotoInput'),
        scannerOverlay: $('scannerOverlay'),
        scannerVideo: $('scannerVideo'),
        scannerStatus: $('scannerStatus'),
        scannerPhotoButton: $('scannerPhotoButton'),
        scannerCloseButton: $('scannerCloseButton'),
      };

      /* ──────────── 라벨 상태 ──────────── */
      // 과거 숨김 input/checkbox로 관리하던 값들을 단일 상태 객체로 통합했습니다.
      const LabelState = {
        width: 250,
        height: 128,
        secondColor: true,    // 빨강(2색) 사용 여부
        rotation: false,      // 90도 회전
        mirror: false,        // 상하 반전
        tft: false,           // TFT 패널(그레이 배경 + 리샘플)
        compression: false,   // 압축 포맷 전송
        invertLuminance: false, // 흑백 임계값 반전
      };

      // 라벨 타입(rawType) → 적용할 설정. 명시되지 않은 플래그는 기본값(false)입니다.
      const LABEL_CONFIG = {
        0xA0: { width: 250, height: 132, maxWidth: '350px', tft: true, secondColor: false, background: '#ccc' },
        0x0B: { width: 250, height: 128, maxWidth: '350px' },
        0x33: { width: 296, height: 128, maxWidth: '396px', mirror: true },
        0x4B: { width: 400, height: 300, maxWidth: '450px', rotation: true },
        0x2B: { width: 800, height: 480, maxWidth: '530px', rotation: true, mirror: true, compression: true, invertLuminance: true },
        0x8B: { width: 960, height: 640, maxWidth: '550px', rotation: true, compression: true },
        0x22B: { width: 240, height: 416, maxWidth: '450px', rotation: true, mirror: true, compression: true },
      };

      /* ──────────── 유틸리티 함수 ──────────── */
      const Utils = {
        // 바이트 배열/버퍼를 16진수 문자열로 변환
        bytesToHex(data) {
          return [...new Uint8Array(data)]
            .map(x => x.toString(16).padStart(2, '0'))
            .join('');
        },
        hexToBytes(hex) {
          const bytes = [];
          for (let c = 0; c < hex.length; c += 2) {
            bytes.push(parseInt(hex.substr(c, 2), 16));
          }
          return new Uint8Array(bytes);
        },
        // 32비트 정수를 리틀엔디언 4바이트 hex 문자열로 변환
        intToHex(num) {
          const hexStr = ("00000000" + num.toString(16)).slice(-8);
          return hexStr.substring(6, 8) + hexStr.substring(4, 6) + hexStr.substring(2, 4) + hexStr.substring(0, 2);
        }
      };

      /* ──────────── 테마 관리 ──────────── */
      const ThemeManager = {
        // 버튼에는 "현재 클릭하면 전환될 테마"의 아이콘을 표시합니다.
        // (라이트 모드 → 🌙, 다크 모드 → ☀️)
        syncIcon() {
          const isDark = dom.body.getAttribute("data-theme") === "dark";
          dom.themeToggle.textContent = isDark ? "☀️" : "🌙";
        },
        toggleTheme() {
          const currentTheme = dom.body.getAttribute("data-theme");
          const newTheme = currentTheme === "light" ? "dark" : "light";
          dom.body.setAttribute("data-theme", newTheme);
          ThemeManager.syncIcon();
        }
      };

      /* ──────────── 캔버스 관리 ──────────── */
      const CanvasManager = {
        container: dom.imageBox,
        canvas: dom.canvas,
        ctx: dom.canvas.getContext('2d'),
        originalImageData: null, // 업로드된 원본 이미지 데이터를 저장
        image: null,  // 드래그 이동 및 확대/축소를 위한 이미지 저장
        scale: 1,
        newW: 0,
        newH: 0,
        offsetX: 0,
        offsetY: 0,
        initCanvas() {
          dom.imageUpload.value = '';
          dom.saveButton.disabled = true;
          this.originalImageData = null;
          this.image = null;
          this.scale = 1;
          this.newW = 0;
          this.newH = 0;
          this.offsetX = 0;
          this.offsetY = 0;
          this.canvas.width = LabelState.width;
          this.canvas.height = LabelState.height;
          this.canvas.removeAttribute("style");
          if (this.canvas.width > this.container.clientWidth - 15) {
            this.canvas.style.width = `${this.container.clientWidth - 15}px`;
          }

          this.ctx.fillStyle = LabelState.tft ? '#969696' : 'white';
          this.ctx.fillRect(0, 0, LabelState.width, LabelState.height);
        },

        // 선택된 라벨 타입에 맞춰 LabelState와 미리보기 박스를 갱신합니다.
        decodeTypes() {
          const rawType = Number("0x" + dom.optionsSelect.value);
          console.log("Display Type: " + rawType);

          // 기본값으로 초기화 후, 해당 타입의 설정만 덮어씁니다.
          Object.assign(LabelState, {
            secondColor: true,
            rotation: false,
            mirror: false,
            tft: false,
            compression: false,
            invertLuminance: false,
          });

          const config = LABEL_CONFIG[rawType];
          if (config) {
            const { maxWidth, background, ...flags } = config;
            Object.assign(LabelState, flags);
            dom.imageBox.style.maxWidth = maxWidth || '350px';
            dom.imageBox.style.background = background || 'white';
          } else {
            dom.imageBox.style.maxWidth = '350px';
            dom.imageBox.style.background = 'white';
          }

          // 빨강 슬라이더는 2색(빨강)을 사용할 때만 활성화합니다.
          dom.redSlider.disabled = !LabelState.secondColor;
        },
        /* displayOverlay() : 원본 이미지 데이터를 이용해
           - bwData: luminance 기준 (luminance > lumThreshold → 흰색, 아니면 검정)
           - redOverlayData: (r > redThreshold && g < redThreshold)이면 빨강, 아니면 투명
           최종 합성하여 캔버스에 출력하고, 그 결과를 pixelData에 헥스 문자열로 저장
        */
        displayOverlay() {
          if (!this.originalImageData) return;
          const width = this.canvas.width;
          const height = this.canvas.height;
          const origData = this.originalImageData;
          const bwData = this.ctx.createImageData(width, height);
          const redOverlayData = this.ctx.createImageData(width, height);
          const finalData = this.ctx.createImageData(width, height);

          // 슬라이더 값 읽기
          const lumThreshold = parseInt(dom.luminanceSlider.value);
          const redThreshold = parseInt(dom.redSlider.value);
          const secondColorEnabled = LabelState.secondColor;
          const tftEnabled = LabelState.tft;

          for (let i = 0; i < origData.data.length; i += 4) {
            const r = origData.data[i];
            const g = origData.data[i + 1];
            const b = origData.data[i + 2];

            // 흑백 이진화 (luminance 기준)
            const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            if (luminance > lumThreshold) {
              bwData.data[i] = 255;
              bwData.data[i + 1] = 255;
              bwData.data[i + 2] = 255;
              bwData.data[i + 3] = 255;
              if (tftEnabled) {
                bwData.data[i] = 150;
                bwData.data[i + 1] = 150;
                bwData.data[i + 2] = 150;
                bwData.data[i + 3] = 255;
              }
            } else {
              bwData.data[i] = 0;
              bwData.data[i + 1] = 0;
              bwData.data[i + 2] = 0;
              bwData.data[i + 3] = 255;
            }

            // 빨강 오버레이: r > redThreshold && g < redThreshold이면 빨강, 아니면 투명
            if (secondColorEnabled && r > redThreshold && g < redThreshold) {
              redOverlayData.data[i] = 255;
              redOverlayData.data[i + 1] = 0;
              redOverlayData.data[i + 2] = 0;
              redOverlayData.data[i + 3] = 255;
            } else {
              redOverlayData.data[i] = 0;
              redOverlayData.data[i + 1] = 0;
              redOverlayData.data[i + 2] = 0;
              redOverlayData.data[i + 3] = 0;
            }

            // 최종 합성: 빨강 오버레이가 적용된 픽셀은 빨강, 그렇지 않으면 bwData
            if (redOverlayData.data[i + 3] > 0) {
              finalData.data[i] = redOverlayData.data[i];
              finalData.data[i + 1] = redOverlayData.data[i + 1];
              finalData.data[i + 2] = redOverlayData.data[i + 2];
              finalData.data[i + 3] = 255;
            } else {
              finalData.data[i] = bwData.data[i];
              finalData.data[i + 1] = bwData.data[i + 1];
              finalData.data[i + 2] = bwData.data[i + 2];
              finalData.data[i + 3] = 255;
            }
          }

          this.ctx.clearRect(0, 0, width, height);
          this.ctx.putImageData(finalData, 0, 0);
          this.getPixelData();
        },

        getPixelData() {
          const secondColorEnabled = LabelState.secondColor;
          const rotationEnabled = LabelState.rotation;
          const tftEnabled = LabelState.tft;
          const mirrorEnabled = LabelState.mirror;
          const compressionEnabled = LabelState.compression;
          const invertLuminanceEnabled = LabelState.invertLuminance;
          var canvas = this.canvas;
          var ctx = this.ctx;
          var width = canvas.width;
          var height = canvas.height;
          var imageData = ctx.getImageData(0, 0, width, height);
          // 슬라이더 값 읽기
          const lumThreshold = parseInt(dom.luminanceSlider.value);
          const redThreshold = parseInt(dom.redSlider.value);
          let originalCanvas = document.createElement("canvas");
          let originalCtx = originalCanvas.getContext("2d");
          originalCanvas.width = canvas.width;
          originalCanvas.height = canvas.height;
          originalCtx.putImageData(imageData, 0, 0);

          if (tftEnabled) {
            var tempCanvas = document.createElement('canvas');
            var tempCtx = tempCanvas.getContext('2d');
            width = canvas.width / 2;
            height = canvas.height * 2;
            tempCanvas.width = width;
            tempCanvas.height = height;

            // 4. 원본 캔버스를 새로운 크기로 그리기 (리사이징)
            tempCtx.drawImage(originalCanvas, 0, 0, imageData.width, imageData.height, 0, 0, width, height);

            // 5. 리사이즈된 이미지 데이터를 반환
            imageData = tempCtx.getImageData(0, 0, width, height);
          }

          if (mirrorEnabled) {
            var tempCanvas = document.createElement('canvas');
            var tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;

            // 1) 캔버스 y축 기준으로 이동
            tempCtx.translate(0, height);
            // 2) y축 스케일을 -1로 설정해서 상하 반전
            tempCtx.scale(1, -1);

            // 원본 이미지를 반전된 좌표계에 그리기
            tempCtx.drawImage(
              originalCanvas,
              0, 0, imageData.width, imageData.height,  // 원본에서 가져올 영역
              0, 0, width, height                       // 대상 캔버스에 그릴 위치/크기
            );

            // 반전된 픽셀 데이터를 다시 가져옴
            imageData = tempCtx.getImageData(0, 0, width, height);
          }

          var pixels = imageData.data;
          var byteData = [];
          var byteDataRed = [];
          var currentByte = 0;
          var currentByteRed = 0;
          var bitPosition = 7;
          for (var x = 0; x < width; x++) {
            for (var y = 0; y < height; y++) {
              var curr = (Math.round(y * width) + x) * 4;
              if (rotationEnabled) curr = ((x * height) + y) * 4;
              var r = pixels[curr];
              var g = pixels[curr + 1];
              var b = pixels[curr + 2];
              var luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;

              if (invertLuminanceEnabled) {
                if (luminance < lumThreshold) {
                  currentByte |= (1 << bitPosition);
                }
              }
              else {
                if (luminance > lumThreshold) {
                  currentByte |= (1 << bitPosition);
                }
              }
              if (r > redThreshold && g < redThreshold) {
                currentByteRed |= (1 << bitPosition);
              }

              bitPosition--;
              if (bitPosition < 0) {
                byteData.push(currentByte);
                byteDataRed.push(currentByteRed);
                currentByte = 0;
                currentByteRed = 0;
                bitPosition = 7;
              }
            }
          }

          if (bitPosition !== 7) {
            byteData.push(currentByte);
            byteDataRed.push(currentByteRed);
          }

          let outputBytes = [];
          if (compressionEnabled) {
            const bytesPerLine = height / 8;
            // 선두 4바이트는 전체 길이 헤더 자리(값은 마지막에 채움)
            outputBytes.push(0x00, 0x00, 0x00, 0x00);

            // 한 채널(흑백 또는 빨강)을 열(line) 단위 압축 포맷으로 인코딩
            const appendChannel = (channelBytes) => {
              let pos = 0;
              for (let col = 0; col < width; col++) {
                outputBytes.push(
                  COMP_BLOCK_MARKER,
                  bytesPerLine + COMP_HEADER_EXTRA,
                  bytesPerLine,
                  0x00, 0x00, 0x00, 0x00
                );
                for (let b = 0; b < bytesPerLine; b++) {
                  outputBytes.push(channelBytes[pos++]);
                }
              }
            };

            appendChannel(byteData);
            if (secondColorEnabled) appendChannel(byteDataRed);

            // 선두 4바이트에 전체 길이를 리틀엔디언으로 기록
            const len = outputBytes.length;
            outputBytes[0] = len & 0xff;
            outputBytes[1] = (len >> 8) & 0xff;
            outputBytes[2] = (len >> 16) & 0xff;
            outputBytes[3] = (len >> 24) & 0xff;
          } else {
            outputBytes = [...byteData];
            if (secondColorEnabled) outputBytes = [...outputBytes, ...byteDataRed];
          }
          dom.pixelData.value = Utils.bytesToHex(outputBytes);
        },
        /* 이미지 업로드 시 원본 이미지를 캔버스에 그리고 저장 */
        drawImage(img) {
          dom.saveButton.disabled = false;
          this.image = img;  // 로드된 이미지를 저장합니다.
          const canvasW = this.canvas.width;
          const canvasH = this.canvas.height;
          // 기본 스케일은 캔버스에 꽉 차게 계산
          const scale = Math.max(canvasW / img.width, canvasH / img.height);
          this.scale = scale;
          this.newW = img.width * scale;
          this.newH = img.height * scale;
          // 초기 오프셋은 중앙 정렬
          this.offsetX = (canvasW - this.newW) / 2;
          this.offsetY = (canvasH - this.newH) / 2;
          // 이미지 렌더링(오버레이 포함)
          this.render();
        },
        // render() 함수: 현재 오프셋과 스케일을 반영하여 이미지를 다시 그립니다.
        render() {
          const canvasW = this.canvas.width;
          const canvasH = this.canvas.height;
          this.ctx.clearRect(0, 0, canvasW, canvasH);
          this.ctx.fillStyle = 'white';
          this.ctx.fillRect(0, 0, canvasW, canvasH);
          // 저장된 이미지와 현재 오프셋, 크기를 이용해 이미지를 그립니다.
          this.ctx.drawImage(this.image, this.offsetX, this.offsetY, this.newW, this.newH);
          // 오버레이 처리를 위해 현재 캔버스의 이미지 데이터를 저장한 후 displayOverlay() 호출
          this.originalImageData = this.ctx.getImageData(0, 0, canvasW, canvasH);
          this.displayOverlay();
        },
        saveImage() {
          // PNG 포맷으로 Data URI 생성
          const dataURL = this.canvas.toDataURL('image/png');
          // 링크 생성 후 자동 클릭
          const link = document.createElement('a');
          link.href = dataURL;
          link.download = 'image.png';  // 저장될 파일 이름
          link.click();
        }
      };

      /* ──────────── 라벨(파라미터) 관리 (필요 시) ──────────── */
      const LabelManager = {
        updateParameters() {
          // 라벨 선택 시 필요한 동작 (여기서는 단순히 캔버스 갱신)
          CanvasManager.decodeTypes();
          CanvasManager.initCanvas();
          CanvasManager.displayOverlay();
        }
      };

      /* ──────────── BLE 관리 (필요 시) ──────────── */
      const BLEManager = {
        bleDevice: null,
        gattServer: null,
        bleService: null,
        writeChar: null,
        writeImageChar: null,
        reconnectAttempts: 0,
        imgHexData: "",
        imgHexLength: 0,
        uploadPartIndex: 0,
        totalParts: 0,
        serviceUuid: 0,
        checkSupport() {
          if (!navigator.bluetooth) {
            dom.bleSupport.innerHTML = "해당 브라우저는 Web Bluetooth를 지원하지 않습니다.<br>PC Chrome 브라우저 에서 시도하세요";
            dom.uploadButton.disabled = true;
          }
        },
        reset() {
          this.gattServer = null;
          this.bleService = null;
          this.writeChar = null;
          this.writeImageChar = null;
          this.imgHexData = "";
          this.imgHexLength = 0;
          this.uploadPartIndex = 0;
          this.totalParts = 0;
          this.serviceUuid = 0;
        },
        async sendCommand(cmd) {
          if (this.writeChar) {
            try {
              await this.writeChar.writeValue(cmd);
            } catch (e) {
              addLog("GATT operation in progress. 재시도...");
              await new Promise(resolve => setTimeout(resolve, 500));
              await this.writeChar.writeValue(cmd);
            }
          }
        },
        async sendCommandHex(cmdHex) {
          const cmd = Utils.hexToBytes(cmdHex);
          addLog('송신 데이터 : ' + cmdHex);
          await this.sendCommand(cmd);
        },
        async sendImageCommand(cmd) {
          if (this.writeImageChar) {
            try {
              await this.writeImageChar.writeValue(cmd);
            } catch (e) {
              addLog("GATT operation in progress. 재시도...");
              await new Promise(resolve => setTimeout(resolve, 500));
              await this.writeImageChar.writeValue(cmd);
            }
          }
        },
        sendImageData() {
          const imgData = dom.pixelData.value;
          this.imgHexData = imgData.replace(/(?:\r\n|\r|\n|,|0x| )/g, '');
          this.imgHexLength = this.imgHexData.length;
          this.uploadPartIndex = 0;
          this.totalParts = Math.ceil(this.imgHexLength / IMAGE_PART_HEX_LEN);
          addLog("이미지 업로드");
          setStatus("이미지 업로드 시작");
          setProgress(0);
          this.sendCommandHex("01");
        },
        handleImageState(dataHex) {
          switch (dataHex.substring(0, 2)) {
            case "01":
              if (dataHex === "01f400")
                this.sendCommandHex("02" + Utils.intToHex(this.imgHexLength / 2) + "000000");
              else
                addLog("새로운 이미지 전송을 위해 재연결하세요.");
              break;
            case "02":
              addLog("이미지 전송 단계 3 진행 중");
              this.sendCommandHex("03");
              break;
            case "05":
              if (dataHex.substring(2, 4) === "08") {
                addLog("이미지 업로드 완료");
                setStatus("이미지 업로드 완료");
                setProgress(100);
                if (this.gattServer && this.gattServer.connected) {
                  if (this.bleDevice && this.bleDevice.gatt.connected)
                    this.bleDevice.gatt.disconnect();
                  this.disconnect();
                }
              } else if (dataHex.substring(2, 4) !== "00") {
                addLog("업로드 중 오류 발생, 전송 중단!");
              } else {
                this.sendNextImagePart(dataHex.substring(4, 12));
              }
              break;
          }
        },
        sendNextImagePart(partAckHex) {
          if (this.imgHexData.length > 0) {
            let currentPartHex = "";
            console.log("PartACK: " + partAckHex + " PartUpload: " + Utils.intToHex(this.uploadPartIndex));
            if (partAckHex === Utils.intToHex(this.uploadPartIndex)) {
              currentPartHex = Utils.intToHex(this.uploadPartIndex) + this.imgHexData.substring(0, IMAGE_PART_HEX_LEN);
              this.imgHexData = this.imgHexData.substring(IMAGE_PART_HEX_LEN);
              this.uploadPartIndex++;
            } else {
              addLog("오류 발생, 마지막 부분 재전송");
              currentPartHex = Utils.intToHex(this.uploadPartIndex) + this.imgHexData.substring(0, IMAGE_PART_HEX_LEN);
            }
            if (this.totalParts > 0) {
              setProgress((this.uploadPartIndex / this.totalParts) * 100);
              setStatus(`이미지 업로드 중... (${this.uploadPartIndex}/${this.totalParts})`);
            }
            console.log('Current Part: ' + currentPartHex);
            this.sendImageCommand(Utils.hexToBytes(currentPartHex));
          } else {
            addLog("이미지 업로드 완료");
          }
        },
        disconnect() {
          this.reset();
          addLog('연결 해제됨.');
          dom.uploadButton.disabled = false;
        },
        handleNotification(data) {
          addLog("수신 데이터 : " + Utils.bytesToHex(data.buffer));
          setTimeout(() => this.handleImageState(Utils.bytesToHex(data.buffer)), 50);
        },
        initiateConnection() {
          dom.log.innerHTML = '';
          dom.uploadButton.disabled = true;
          setProgress(null);
          setStatus("라벨 선택중...");
          if (this.gattServer && this.gattServer.connected) {
            if (this.bleDevice && this.bleDevice.gatt.connected) this.bleDevice.gatt.disconnect();
            dom.uploadButton.disabled = false;
          } else {
            this.reconnectAttempts = 0;

            // 입력된 라벨 번호가 있으면 해당 기기 이름(NEMRxxyyzzkk)으로 필터링하여
            // 블루투스 선택창에 그 라벨만 표시되게 한다.
            // (Web Bluetooth는 보안상 MAC으로 직접 연결할 수 없고 선택창도 생략 불가)
            const target = MacInput.read();
            let requestOptions;
            if (target.valid) {
              addLog("대상 라벨 : " + target.name + " (MAC " + target.mac + ")");
              requestOptions = {
                filters: [{ namePrefix: target.name }],
                optionalServices: [0xFEF0, 0xFDF0]
              };
            } else {
              requestOptions = {
                filters: [{ manufacturerData: [{ companyIdentifier: 0x5053 }] }],
                optionalServices: [0xFEF0, 0xFDF0]
              };
            }

            navigator.bluetooth.requestDevice(requestOptions).then(device => {
              setStatus("연결중 : " + device.name);
              device.addEventListener('gattserverdisconnected', () => this.disconnect());
              this.bleDevice = device;
              this.connect();
            }).catch(handleBLEError);
          }
        },
        reConnect() {
          this.reconnectAttempts = 0;
          if (this.bleDevice && this.bleDevice.gatt.connected)
            this.bleDevice.gatt.disconnect();
          this.reset();
          addLog("재연결 시도");
          setTimeout(() => this.connect(), 300);
        },
        connect() {
          if (!this.writeChar) {
            addLog("연결중 : " + this.bleDevice.name);
            this.bleDevice.gatt.connect().then(server => {
              this.gattServer = server;
              return this.gattServer.getPrimaryServices();
            }).then(services => {
              services.forEach(service => {
                if (this.serviceUuid == 0) {
                  this.serviceUuid = parseInt(service.uuid.substring(4, 8), 16);
                  addLog("Service UUID : " + service.uuid.toString());
                  addLog("UUID : 0x" + this.serviceUuid.toString(16));
                }
              });
              return this.gattServer.getPrimaryService(this.serviceUuid);
            }).then(service => {
              this.bleService = service;
              return this.bleService.getCharacteristic(this.serviceUuid + 2);
            }).then(characteristic => {
              this.writeImageChar = characteristic;
              return this.bleService.getCharacteristic(this.serviceUuid + 1);
            }).then(characteristic => {
              this.writeChar = characteristic;
              setTimeout(() => this.sendImageData(), 1000);
              return this.writeChar.startNotifications().then(() => {
                this.writeChar.addEventListener('characteristicvaluechanged', event => {
                  this.handleNotification(event.target.value);
                });
              });
            }).catch(handleBLEError);
          }
        },
      }
      /* ──────────── BLE 상태 및 로그 헬퍼 ──────────── */
      const MAX_LOG_LINES = 100;
      function setStatus(statusText) {
        dom.status.innerHTML = statusText;
      }
      // 업로드 진행바 갱신 (percent: 0~100, null이면 숨김)
      function setProgress(percent) {
        if (percent === null) {
          dom.progressWrap.style.display = 'none';
          return;
        }
        const value = Math.max(0, Math.min(100, Math.round(percent)));
        dom.progressWrap.style.display = 'block';
        dom.progressBar.style.width = value + '%';
        dom.progressText.textContent = value + '%';
      }
      function addLog(logText) {
        const now = new Date();
        const time = ("0" + now.getHours()).slice(-2) + ":" +
          ("0" + now.getMinutes()).slice(-2) + ":" +
          ("0" + now.getSeconds()).slice(-2) + " : ";
        dom.log.innerHTML += time + logText + '<br>';
        console.log(time + logText);
        // 로그가 너무 길어지면 오래된 줄부터 제거
        while ((dom.log.innerHTML.match(/<br>/g) || []).length > MAX_LOG_LINES) {
          const firstBreak = dom.log.innerHTML.indexOf("<br>");
          dom.log.innerHTML = dom.log.innerHTML.substring(firstBreak + 4);
        }
      }
      function handleBLEError(error) {
        console.error(error);
        setStatus("에러 : " + error);
        BLEManager.disconnect();
        if (BLEManager.bleDevice && BLEManager.bleDevice.gatt.connected) {
          BLEManager.bleDevice.gatt.disconnect();
        }
      }

      /* ──────────── 라벨 번호(MAC) 입력 관리 ──────────── */
      const MacInput = {
        // 4개 옥텟 입력을 읽어 라벨 이름/MAC 정보를 반환한다.
        // 화면 번호 xx.xx.xx.xx → 기기 이름 NEMRxxxxxxxx, 실제 MAC FF:FF:xx:xx:xx:xx
        read() {
          const parts = dom.macOctets.map(el => el.value.trim());
          const valid = parts.every(p => /^[0-9a-fA-F]{1,2}$/.test(p));
          if (!valid) return { valid: false };
          const octets = parts.map(p => p.padStart(2, '0').toUpperCase());
          return {
            valid: true,
            octets,
            name: 'NEMR' + octets.join(''),
            mac: 'FF:FF:' + octets.join(':'),
          };
        },
        // 바코드 문자열을 4개 옥텟으로 파싱
        // 지원: "92.95.85.02", "92958502", "NEMR92958502", "FF:FF:92:95:85:02"
        parseBarcode(text) {
          const cleaned = text.trim().toUpperCase();
          const toOctets = (a, b, c, d) =>
            [a, b, c, d].map(o => o.padStart(2, '0'));

          let m = cleaned.match(/^NEMR([0-9A-F]{8})$/);
          if (m) return [0, 2, 4, 6].map(i => m[1].slice(i, i + 2));

          m = cleaned.match(/^FF:FF:([0-9A-F]{1,2})[.:]([0-9A-F]{1,2})[.:]([0-9A-F]{1,2})[.:]([0-9A-F]{1,2})$/);
          if (m) return toOctets(m[1], m[2], m[3], m[4]);

          m = cleaned.match(/^([0-9A-F]{1,2})\.([0-9A-F]{1,2})\.([0-9A-F]{1,2})\.([0-9A-F]{1,2})$/);
          if (m) return toOctets(m[1], m[2], m[3], m[4]);

          const digits = cleaned.replace(/[^0-9A-F]/g, '');
          if (digits.length >= 8) {
            const last8 = digits.slice(-8);
            return [0, 2, 4, 6].map(i => last8.slice(i, i + 2));
          }
          return null;
        },
        fillOctets(octets) {
          octets.forEach((val, i) => { dom.macOctets[i].value = val; });
        },
        applyBarcode(text) {
          const octets = this.parseBarcode(text);
          if (!octets) return false;
          this.fillOctets(octets);
          return true;
        },
        // 16진수만 허용하고, 두 자리 입력 시 다음 칸으로 자동 이동시킨다.
        setupAutoAdvance() {
          dom.macOctets.forEach((el, idx) => {
            el.addEventListener('input', () => {
              el.value = el.value.replace(/[^0-9a-fA-F]/g, '');
              if (el.value.length >= 2 && idx < dom.macOctets.length - 1) {
                dom.macOctets[idx + 1].focus();
              }
            });
            el.addEventListener('keydown', (e) => {
              if (e.key === 'Backspace' && el.value === '' && idx > 0) {
                dom.macOctets[idx - 1].focus();
              }
            });
          });
        }
      };

      /* ──────────── 바코드 스캔 (ZXing: 카메라 / 사진) ──────────── */
      const BarcodeScanner = {
        codeReader: null,
        scanning: false,

        getHints() {
          const hints = new Map();
          hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.CODE_128,
            ZXing.BarcodeFormat.CODE_39,
            ZXing.BarcodeFormat.ITF,
            ZXing.BarcodeFormat.EAN_13,
            ZXing.BarcodeFormat.EAN_8,
            ZXing.BarcodeFormat.UPC_A,
            ZXing.BarcodeFormat.UPC_E,
            ZXing.BarcodeFormat.CODABAR,
            ZXing.BarcodeFormat.QR_CODE,
            ZXing.BarcodeFormat.DATA_MATRIX,
          ]);
          hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
          return hints;
        },
        getReader() {
          if (!this.codeReader) {
            this.codeReader = new ZXing.BrowserMultiFormatReader(this.getHints());
          }
          return this.codeReader;
        },
        setStatus(msg) {
          dom.scannerStatus.textContent = msg;
        },
        handleResult(text) {
          if (MacInput.applyBarcode(text)) {
            this.setStatus('인식 완료: ' + text);
            setTimeout(() => this.close(), 600);
            return true;
          }
          this.setStatus('인식: ' + text + ' (형식 불일치)');
          return false;
        },
        async open() {
          if (typeof ZXing === 'undefined') {
            alert('바코드 라이브러리 로드 실패. 페이지를 새로고침해 주세요.');
            return;
          }
          dom.scannerOverlay.classList.add('active');
          this.setStatus('카메라 준비 중...');
          this.scanning = true;
          try {
            const reader = this.getReader();
            // 후면 카메라 우선 선택
            const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
            const backCam = devices.find(d =>
              /back|rear|environment/i.test(d.label)
            );
            const deviceId = backCam ? backCam.deviceId : (devices[0]?.deviceId);

            await reader.decodeFromVideoDevice(
              deviceId,
              dom.scannerVideo.id,
              (result, err) => {
                if (!this.scanning) return;
                if (result) this.handleResult(result.getText());
              }
            );
            this.setStatus('바코드를 가이드 안에 맞춰 주세요.');
          } catch (err) {
            this.setStatus('카메라 접근 실패: ' + err.message);
            console.error(err);
          }
        },
        close() {
          this.scanning = false;
          if (this.codeReader) this.codeReader.reset();
          dom.scannerVideo.srcObject = null;
          dom.scannerOverlay.classList.remove('active');
        },
        // 사진 인식용: 대비/선명도 보정 이미지를 여러 장 만들어 순차 시도
        prepareImageVariants(img) {
          const variants = [];
          const scales = [1, 1.5, 2];
          const filters = [
            null,
            'contrast(1.8) brightness(1.1)',
            'grayscale(1) contrast(2.5) brightness(1.2)',
          ];
          for (const scale of scales) {
            for (const filter of filters) {
              const canvas = document.createElement('canvas');
              canvas.width = Math.round(img.naturalWidth * scale);
              canvas.height = Math.round(img.naturalHeight * scale);
              const ctx = canvas.getContext('2d');
              if (filter) ctx.filter = filter;
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              variants.push(canvas);
            }
          }
          return variants;
        },
        async decodeImageElement(source) {
          const reader = this.getReader();
          return reader.decodeFromImageElement(source);
        },
        async decodeFromFile(file) {
          const url = URL.createObjectURL(file);
          const img = new Image();
          try {
            await new Promise((resolve, reject) => {
              img.onload = resolve;
              img.onerror = reject;
              img.src = url;
            });
            this.setStatus('바코드 분석 중...');
            const variants = this.prepareImageVariants(img);
            for (const variant of variants) {
              try {
                const result = await this.decodeImageElement(variant);
                if (this.handleResult(result.getText())) {
                  setStatus('바코드 인식: ' + result.getText());
                  return;
                }
              } catch (e) {
                // NotFoundException — 다음 변형 시도
              }
            }
            alert('바코드를 찾지 못했습니다.\n바코드가 선명하게 보이도록 다시 촬영해 주세요.');
          } catch (err) {
            alert('바코드 인식 실패: ' + err.message);
          } finally {
            URL.revokeObjectURL(url);
            dom.barcodePhotoInput.value = '';
          }
        },
        setup() {
          dom.scanBarcodeButton.addEventListener('click', () => this.open());
          dom.scannerCloseButton.addEventListener('click', () => this.close());
          dom.scannerPhotoButton.addEventListener('click', () => dom.barcodePhotoInput.click());
          dom.barcodePhotoInput.addEventListener('change', () => {
            const file = dom.barcodePhotoInput.files[0];
            if (file) this.decodeFromFile(file);
          });
        }
      };

      /* ──────────── 이벤트 리스너 등록 ──────────── */
      MacInput.setupAutoAdvance();
      BarcodeScanner.setup();
      dom.themeToggle.addEventListener('click', ThemeManager.toggleTheme);
      dom.optionsSelect.addEventListener('change', () => {
        LabelManager.updateParameters();
      });
      dom.imageUpload.addEventListener('change', function () {
        const file = this.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            const img = new Image();
            img.onload = function () {
              CanvasManager.drawImage(img);
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        }
      });
      // 슬라이더 이동 시 실시간 결과 갱신
      dom.luminanceSlider.addEventListener('input', function () {
        dom.lumVal.textContent = this.value;
        CanvasManager.displayOverlay();
      });
      dom.redSlider.addEventListener('input', function () {
        dom.redVal.textContent = this.value;
        CanvasManager.displayOverlay();
      });

      dom.uploadButton.addEventListener('click', () => {
        BLEManager.initiateConnection();
      });
      dom.saveButton.addEventListener('click', () => {
        CanvasManager.saveImage();
      });
      // 페이지 로드 시 초기화
      window.onload = function () {
        ThemeManager.syncIcon();
        LabelManager.updateParameters();
        BLEManager.checkSupport();
      };

      // ────────── 캔버스 드래그, 커서 변경 및 확대/축소 기능 추가 ──────────
      (function () {
        const canvas = CanvasManager.canvas;
        let isDragging = false;
        let startX, startY;

        // 마우스 오버 시 이동 가능한 커서로 변경
        canvas.addEventListener('mouseenter', () => {
          canvas.style.cursor = "grab";
        });
        canvas.addEventListener('mouseleave', () => {
          canvas.style.cursor = "default";
          isDragging = false;
        });

        canvas.addEventListener('mousedown', (e) => {
          isDragging = true;
          startX = e.offsetX;
          startY = e.offsetY;
          canvas.style.cursor = "grabbing";
        });

        canvas.addEventListener('mousemove', (e) => {
          if (!isDragging) return;
          // 드래그한 거리 계산
          const dx = e.offsetX - startX;
          const dy = e.offsetY - startY;
          // CanvasManager의 오프셋 업데이트
          CanvasManager.offsetX += dx;
          CanvasManager.offsetY += dy;
          // 시작 좌표 갱신
          startX = e.offsetX;
          startY = e.offsetY;
          // 새 오프셋에 맞게 다시 렌더링
          CanvasManager.render();
        });

        canvas.addEventListener('mouseup', () => {
          isDragging = false;
          canvas.style.cursor = "grab";
        });

        // 마우스 휠 이벤트: 확대/축소
        canvas.addEventListener('wheel', (e) => {
          e.preventDefault();
          const zoomFactor = 1.1;
          const oldScale = CanvasManager.scale;
          let newScale;
          if (e.deltaY < 0) {  // 확대
            newScale = oldScale * zoomFactor;
          } else {             // 축소
            newScale = oldScale / zoomFactor;
          }
          // 현재 마우스 좌표를 기준으로 확대/축소
          const rect = canvas.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;
          // 이미지 상의 좌표 (기존 스케일 기준)
          const imageX = (mouseX - CanvasManager.offsetX) / oldScale;
          const imageY = (mouseY - CanvasManager.offsetY) / oldScale;
          // 새로운 스케일 적용
          CanvasManager.scale = newScale;
          CanvasManager.newW = CanvasManager.image.width * newScale;
          CanvasManager.newH = CanvasManager.image.height * newScale;
          // 마우스 위치가 이미지 내 동일 위치가 되도록 오프셋 보정
          CanvasManager.offsetX = mouseX - imageX * newScale;
          CanvasManager.offsetY = mouseY - imageY * newScale;
          CanvasManager.render();
        });
      })();
    })();
  </script>
</body>

</html>
